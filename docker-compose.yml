services:
  rasa-server:
    build: .
    image: chatbot-univ:latest
    container_name: rasa-server
    ports:
      - "5005:5005"
    volumes:
      - ./models:/app/models
    networks:
      - chatbot-network
    depends_on:
      - action-server

  action-server:
    image: rasa/rasa-sdk:3.6.0
    container_name: action-server
    expose:
      - "5055"
    volumes:
      - ./actions:/app/actions
    networks:
      - chatbot-network

networks:
  chatbot-network:
    driver: bridge
