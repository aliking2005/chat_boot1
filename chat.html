<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Assistant Université</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f9;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 30px;
  }
  h1 { color: #2c3e50; }
  #chat-container {
    width: 400px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: white;
    overflow: hidden;
  }
  #messages {
    height: 400px;
    overflow-y: auto;
    padding: 10px;
  }
  .msg {
    margin: 8px 0;
    padding: 8px 12px;
    border-radius: 12px;
    max-width: 80%;
    clear: both;
  }
  .user {
    background: #007bff;
    color: white;
    float: right;
  }
  .bot {
    background: #e9ecef;
    color: #333;
    float: left;
  }
  #input-area {
    display: flex;
    border-top: 1px solid #ccc;
  }
  #input-area input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
  }
  #input-area button {
    padding: 10px 16px;
    background: #2c3e50;
    color: white;
    border: none;
    cursor: pointer;
  }
</style>
</head>
<body>
  <h1>🎓 Assistant Virtuel - Université</h1>
  <div id="chat-container">
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="userInput" placeholder="Tapez votre message..." />
      <button onclick="sendMessage()">Envoyer</button>
    </div>
  </div>

<script>
  const messagesDiv = document.getElementById('messages');
  const input = document.getElementById('userInput');

  input.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendMessage();
  });

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    div.innerText = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    input.value = '';

    try {
      const response = await fetch('http://chatanas.sytes.net:5005/webhooks/rest/webhook', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sender: 'user', message: text })
      });
      const data = await response.json();
      data.forEach(msg => {
        if (msg.text) addMessage(msg.text, 'bot');
      });
    } catch (err) {
      addMessage('Erreur de connexion au serveur Rasa.', 'bot');
      console.error(err);
    }
  }
</script>
</body>
</html>
